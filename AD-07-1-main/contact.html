<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="menu-principal"></nav>

    <main>
      <center><h1>¡Contactanos hoy mismo!</h1></center>
      <br /><br />
      <center>
        <img
          src="https://www.rampastelescopicas.es/wp-content/uploads/sites/8/2020/06/contactanos-2000x789-1-e1683644052881.png"
          width="500"
          height="200"
          alt="Contacto"
          id="img1-contact"
        />
      </center>
      <br />
      <center>
        <a href="mailto:Bid&Grid@empress.com.mx" id="correo-contact"
          >Correo electronico: Bid&Grid@empress.com.mx</a
        >
      </center>
      <br />
      <center><p id="tel-contact">Teléfono: (55) 1234-5678</p></center>

      <center>
        <p id="label-comentario">Escribenos:</p>
      </center>
      <center>
        <form>
          <textarea
            id="comentario-contact"
            name="comentario"
            rows="10"
            cols="40"
          ></textarea>
          <br /><br />
          <input id="boton-enviar-contact" type="submit" value="Enviar datos" />
          <input id="boton-borrar-contact" type="reset" value="Borrar datos" />
        </form>
        <br /><br />
      </center>
      
    </main>
    <footer></footer>
  </body>
</html>
